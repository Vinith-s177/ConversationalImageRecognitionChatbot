<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AuraBot</title>
    <!-- Core Styling -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card login-card">
            
            <h2 class="auth-title">
                🔐 Login to AuraBot
            </h2>

            <!-- Registration Success display -->
            <div th:if="${successMessage}" class="success-message">
                <span th:text="${successMessage}"></span>
            </div>

            <!-- Validation Error display -->
            <div th:if="${error}" class="error-message">
                <strong>Error:</strong> <span th:text="${error}"></span>
            </div>

            <!-- Login Form -->
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="Username" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••••••" required autocomplete="current-password">
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" name="rememberMe" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="auth-link">Forgot password?</a>
                </div>

                <button type="submit" class="btn-auth-login">Login</button>
            </form>

            <div class="auth-footer">
                Don't have an account?<a th:href="@{/register}">Register</a>
            </div>
        </div>
    </div>
</body>
</html>
