spring.application.name=chatbot

# Server Port (Koyeb/Render compatible)
server.port=${PORT:8081}


# ===============================
# H2 Database Configuration
# ===============================
spring.datasource.url=jdbc:h2:file:./data/aura_bot_db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect


# ===============================
# JPA / Hibernate Configuration
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# ===============================
# File Upload Configuration
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# ===============================
# OpenRouter AI Configuration
# API key will be added in Koyeb Environment Variables
# ===============================
ai.api.key=${OPENROUTER_API_KEY}

ai.model=google/gemini-2.5-flash


# ===============================
# n8n Webhook Configuration
# ===============================
n8n.webhook.url=${N8N_WEBHOOK_URL:}